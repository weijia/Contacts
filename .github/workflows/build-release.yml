name: Build and Upload APK to SFTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # ========== 版本号处理 ==========
    - name: Update versionCode before build
      id: version
      run: |
        VERSION_NAME=$(grep "VERSION_NAME" gradle.properties | cut -d'=' -f2)
        OLD_VERSION_CODE=$(grep "VERSION_CODE" gradle.properties | cut -d'=' -f2)
        BUILD_NUMBER=${{ github.run_number }}

        # 使用 GitHub run_number 作为 versionCode（全仓库唯一递增）
        sed -i "s/VERSION_CODE=$OLD_VERSION_CODE/VERSION_CODE=$BUILD_NUMBER/" gradle.properties

        echo "Updated VERSION_CODE: $BUILD_NUMBER"
        echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
        echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
        echo "apk_name=contacts-v${VERSION_NAME}-build${BUILD_NUMBER}.apk" >> $GITHUB_OUTPUT

    # ========== 签名 + 构建 ==========
    - name: Setup Release Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/app/release-key.jks
        echo "Keystore decoded"

    - name: Build Release APK (foss flavor)
      env:
        SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        SIGNING_STORE_FILE: ${{ github.workspace }}/app/release-key.jks
        SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      run: |
        ./gradlew assembleFossRelease

    # ========== 查找并重命名 APK ==========
    - name: Find and rename APK with version
      id: apk
      run: |
        mkdir -p renamed
        # 项目有 flavor，APK 在 foss/release 子目录下
        FOUND_APK=$(find app/build/outputs/apk -name "*.apk" -path "*/foss/release/*" | head -1)
        if [ -z "$FOUND_APK" ]; then
          echo "Foss APK not found, trying all release APKs..."
          FOUND_APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
        fi
        if [ -z "$FOUND_APK" ]; then
          echo "Error: No APK found!"
          exit 1
        fi
        echo "Found APK: $FOUND_APK"
        cp "$FOUND_APK" "renamed/${{ steps.version.outputs.apk_name }}"
        echo "APK renamed to ${{ steps.version.outputs.apk_name }}"
        echo "apk_path=renamed/${{ steps.version.outputs.apk_name }}" >> $GITHUB_OUTPUT

    # ========== SFTP 上传 ==========
    - name: Upload APK to SFTP
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: weijia/action-upload-sftp@master
      with:
        sftp-host: ${{ secrets.SFTP_HOST }}
        sftp-port: ${{ secrets.SFTP_PORT }}
        sftp-username: ${{ secrets.SFTP_USERNAME }}
        sftp-password: ${{ secrets.SFTP_PASSWORD }}
        source-path: ${{ steps.apk.outputs.apk_path }}
        remote-path: /home/github/apps/contacts/${{ steps.version.outputs.apk_name }}
        cleanup-old-files: 'true'
        max-keep-files: 5

    # ========== Artifact 上传 ==========
    - name: Upload APK (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: contacts-release-apk
        path: ${{ steps.apk.outputs.apk_path }}

    # ========== 提交 versionCode 更新 ==========
    - name: Commit versionCode update
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add gradle.properties
        git commit -m "[skip ci] Update VERSION_CODE to ${{ steps.version.outputs.build_number }}" || echo "No changes to commit"
        git push origin HEAD:main

    # ========== Tag 时创建 Release ==========
    - name: Create Release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.apk.outputs.apk_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
