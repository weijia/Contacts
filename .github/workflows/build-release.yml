name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Update versionCode before build
      id: version
      run: |
        # 读取当前版本信息
        VERSION_NAME=$(grep "VERSION_NAME" gradle.properties | cut -d'=' -f2)
        OLD_VERSION_CODE=$(grep "VERSION_CODE" gradle.properties | cut -d'=' -f2)
        BUILD_NUMBER=${{ github.run_number }}

        # 使用 GitHub run_number 作为 versionCode（全仓库唯一递增）
        sed -i "s/VERSION_CODE=$OLD_VERSION_CODE/VERSION_CODE=$BUILD_NUMBER/" gradle.properties

        echo "Updated VERSION_CODE: $BUILD_NUMBER"
        echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
        echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
        echo "apk_name=contacts-v${VERSION_NAME}-build${BUILD_NUMBER}.apk" >> $GITHUB_OUTPUT

    - name: Setup Release Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/app/release-key.jks
        echo "Keystore decoded to app/release-key.jks"

    - name: Build Release APK
      env:
        SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        SIGNING_STORE_FILE: ${{ github.workspace }}/app/release-key.jks
        SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      run: |
        ./gradlew assembleRelease

    - name: Rename APK with version
      run: |
        mkdir -p app/build/outputs/apk/release/renamed
        cp app/build/outputs/apk/release/contacts-${{ steps.version.outputs.build_number }}.apk \
           app/build/outputs/apk/release/renamed/${{ steps.version.outputs.apk_name }}
        echo "APK renamed to ${{ steps.version.outputs.apk_name }}"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: contacts-release-apk
        path: app/build/outputs/apk/release/renamed/${{ steps.version.outputs.apk_name }}

    - name: Commit versionCode update
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add gradle.properties
        git commit -m "[skip ci] Update VERSION_CODE to ${{ steps.version.outputs.build_number }}" || echo "No changes to commit"
        git push origin HEAD:main

    - name: Create Release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/renamed/${{ steps.version.outputs.apk_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
